<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajanvaraukset</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="appointments-container">
        <h2>Ajanvaraukset</h2>
        
        <div th:if="${#lists.isEmpty(appointments)}">
            <p>Ei varauksia.</p>
        </div>
        
        <div th:unless="${#lists.isEmpty(appointments)}">
            <ul>
                <li th:each="appointment : ${appointments}">
                    <span th:text="${appointment.startTime}"></span> - <span th:text="${appointment.endTime}"></span>
                </li>
            </ul>
        </div>
        
        <a th:href="@{/index}">Takaisin</a>
    </div>
</body>
</html>
